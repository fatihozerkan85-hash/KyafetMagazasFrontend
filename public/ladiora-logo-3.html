<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ladiora Logo 3 - Elegant Circle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f3f4f6;
        }
        #logo {
            width: 512px;
            height: 512px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <svg id="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#FAE8FF;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#DB2777;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
            </linearGradient>
        </defs>
        
        <rect width="1024" height="1024" fill="url(#circleGrad)" />
        
        <!-- Outer circle border -->
        <circle cx="512" cy="512" r="400" fill="none" stroke="url(#borderGrad)" stroke-width="20" />
        
        <!-- Inner circle -->
        <circle cx="512" cy="512" r="350" fill="white" />
        
        <!-- Monogram L -->
        <text
            x="512"
            y="600"
            font-family="Georgia, serif"
            font-size="320"
            font-weight="bold"
            fill="url(#borderGrad)"
            text-anchor="middle"
            font-style="italic"
        >
            L
        </text>
        
        <!-- Brand name curved -->
        <text
            x="512"
            y="850"
            font-family="Arial, sans-serif"
            font-size="56"
            font-weight="bold"
            fill="url(#borderGrad)"
            text-anchor="middle"
            letter-spacing="6"
        >
            LADIORA
        </text>
    </svg>
</body>
</html>
